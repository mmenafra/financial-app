name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-format-check:
    name: "Backend: format check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost"
      DB_ENGINE: sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check isort
        run: isort --check-only --diff .

      - name: Check black
        run: black --check --diff .

      - name: Check ruff format
        run: ruff format --check .

  backend-lint:
    name: "Backend: lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost"
      DB_ENGINE: sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Ruff
        run: ruff check .

      - name: Flake8
        run: flake8 .

      - name: Pylint
        run: pylint --rcfile=.pylintrc config api

  backend-test:
    name: "Backend: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost"
      DB_ENGINE: sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Pytest
        run: pytest --tb=short -q

  frontend-format-check:
    name: "Frontend: format check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check .

  frontend-lint:
    name: "Frontend: lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx ng lint

      - name: Stylelint
        run: npx stylelint "src/**/*.scss"

  frontend-test:
    name: "Frontend: test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest
        run: npm run test:ci

      - name: Betterer
        run: npx betterer ci
