services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: finance_app
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      DB_ENGINE: "postgres"
      POSTGRES_DB: "finance_app"
      POSTGRES_USER: "finance_user"
      POSTGRES_PASSWORD: "finance_password"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      GOOGLE_CLIENT_ID: "239990524994-h80h7dsd0ku0uv1k6okvsn5gakp9f5di.apps.googleusercontent.com"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
