# Full production stack (nginx for Angular, Django + PostgreSQL).
# Use: docker compose -f docker-compose.prod.yml up --build
# Or:  make docker-prod
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: finance_app
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      DB_ENGINE: "postgres"
      POSTGRES_DB: "finance_app"
      POSTGRES_USER: "finance_user"
      POSTGRES_PASSWORD: "finance_password"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
